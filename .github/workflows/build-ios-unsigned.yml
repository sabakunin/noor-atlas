name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Detect Xcode workspace + scheme
        id: detect
        working-directory: ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['workspace']['schemes'][0])")
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build unsigned archive
        working-directory: ios
        env:
          WORKSPACE: ${{ steps.detect.outputs.workspace }}
          SCHEME: ${{ steps.detect.outputs.scheme }}
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$PWD/build/App.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            archive | tee xcodebuild.log

      - name: Package unsigned IPA
        working-directory: ios
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -qr NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ios/build/NoorAtlas-unsigned.ipa
          retention-days: 14

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          retention-days: 7
