name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Resolve workspace and scheme
        id: project
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [[ -z "$workspace" ]]; then
            echo "No xcworkspace was generated."
            exit 1
          fi
          scheme="$(xcodebuild -list -workspace "$workspace" | awk '/Schemes:/{getline; gsub(/^[[:space:]]+|[[:space:]]+$/, ""); print; exit}')"
          if [[ -z "$scheme" ]]; then
            echo "Unable to determine Xcode scheme."
            exit 1
          fi
          echo "Detected workspace=$workspace scheme=$scheme"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "scheme=$scheme"    >> "$GITHUB_OUTPUT"

      - name: Build unsigned .app for iphoneos
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME: ${{ steps.project.outputs.scheme }}
        run: |
          set -euo pipefail
          derived="$RUNNER_TEMP/derived"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$derived" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            build
          echo "DERIVED=$derived" >> "$GITHUB_ENV"

      - name: Locate built .app
        id: appfind
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing built products:"
          find "$DERIVED/Build/Products" -maxdepth 3 -type d -name '*.app' || true
          app_path="$(find "$DERIVED/Build/Products" -maxdepth 3 -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "ERROR: built .app bundle not found in $DERIVED/Build/Products"
            ls -la "$DERIVED/Build/Products" || true
            exit 1
          fi
          echo "app_path=$app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          payload_dir="$RUNNER_TEMP/Payload"
          rm -rf "$payload_dir"
          mkdir -p "$payload_dir"
          cp -R "$APP_PATH" "$payload_dir/"
          cd "$RUNNER_TEMP"
          zip -qry NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ${{ runner.temp }}/NoorAtlas-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
