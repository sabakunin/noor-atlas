name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Resolve workspace and scheme
        id: project
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [[ -z "$workspace" ]]; then
            echo "ERROR: No xcworkspace was generated."
            ls -la ios/ || true
            exit 1
          fi

          echo "=== xcodebuild -list output ==="
          xcodebuild -list -workspace "$workspace"
          echo "=== end ==="

          # Pick the first NON-Pods scheme (the actual app)
          scheme="$(xcodebuild -list -workspace "$workspace" -json \
            | jq -r '.workspace.schemes[] | select(startswith("Pods") | not)' \
            | head -n1)"

          # Fallback: if jq filter returned nothing, just take first scheme
          if [[ -z "$scheme" ]]; then
            scheme="$(xcodebuild -list -workspace "$workspace" -json \
              | jq -r '.workspace.schemes[0]')"
          fi

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            echo "ERROR: Unable to determine Xcode scheme."
            exit 1
          fi

          echo "Detected workspace=$workspace scheme=$scheme"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "scheme=$scheme"       >> "$GITHUB_OUTPUT"

      - name: Build unsigned .app for iphoneos
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME: ${{ steps.project.outputs.scheme }}
        run: |
          set -euo pipefail
          derived="$RUNNER_TEMP/derived"
          echo "Building scheme '$SCHEME' from workspace '$WORKSPACE'"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$derived" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            build

          echo "DERIVED=$derived" >> "$GITHUB_ENV"

          echo "=== Build/Products tree (depth 4) ==="
          find "$derived/Build/Products" -maxdepth 4 || true
          echo "=== end ==="

      - name: Locate built .app
        id: appfind
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME: ${{ steps.project.outputs.scheme }}
        run: |
          set -euo pipefail

          # Ask Xcode exactly where it placed the built app
          settings="$(xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED" \
            -showBuildSettings 2>/dev/null \
            | grep -E ' (TARGET_BUILD_DIR|WRAPPER_NAME|FULL_PRODUCT_NAME) =' || true)"
          echo "$settings"

          target_build_dir="$(echo "$settings" | awk -F' = ' '/ TARGET_BUILD_DIR /{print $2; exit}')"
          wrapper_name="$(echo "$settings" | awk -F' = ' '/ WRAPPER_NAME /{print $2; exit}')"
          app_path=""

          if [[ -n "$target_build_dir" && -n "$wrapper_name" && -d "$target_build_dir/$wrapper_name" ]]; then
            app_path="$target_build_dir/$wrapper_name"
            echo "Resolved via showBuildSettings: $app_path"
          fi

          # Fallback wide search if showBuildSettings didn't pin it
          if [[ -z "$app_path" ]]; then
            echo "Falling back to find..."
            app_path="$(find "$DERIVED" -type d -name '*.app' -not -path '*/Pods/*' -not -path '*/Intermediates*' -print 2>/dev/null | head -n1 || true)"
          fi

          if [[ -z "$app_path" || ! -d "$app_path" ]]; then
            echo "ERROR: built .app bundle not found anywhere under $DERIVED"
            echo "=== Full derived tree (.app dirs only, any depth) ==="
            find "$DERIVED" -type d -name '*.app' || true
            echo "=== Release-iphoneos contents ==="
            ls -la "$DERIVED/Build/Products/Release-iphoneos" 2>/dev/null || true
            exit 1
          fi

          echo "Final app_path=$app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          payload_dir="$RUNNER_TEMP/Payload"
          rm -rf "$payload_dir"
          mkdir -p "$payload_dir"
          cp -R "$APP_PATH" "$payload_dir/"
          cd "$RUNNER_TEMP"
          zip -qry NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ${{ runner.temp }}/NoorAtlas-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
