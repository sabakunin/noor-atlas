name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install JS dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Create self-signed code signing certificate
        id: cert
        shell: bash
        run: |
          set -euo pipefail
          CERT_DIR="$RUNNER_TEMP/cert"
          mkdir -p "$CERT_DIR"
          cd "$CERT_DIR"

          # OpenSSL config for codesigning cert
          cat > openssl.cnf <<'EOF'
          [ req ]
          distinguished_name = req_distinguished_name
          prompt = no
          req_extensions = v3_req

          [ req_distinguished_name ]
          CN = NoorAtlasSelfSign
          O = NoorAtlas
          C = US

          [ v3_req ]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = critical, codeSigning
          basicConstraints = critical, CA:false
          EOF

          # Generate cert + private key
          openssl req -x509 -newkey rsa:2048 \
            -keyout key.pem -out cert.pem \
            -days 365 -nodes \
            -config openssl.cnf -extensions v3_req

          # Pack into PKCS#12
          openssl pkcs12 -export \
            -out cert.p12 \
            -inkey key.pem -in cert.pem \
            -password pass:certpass \
            -name "NoorAtlasSelfSign"

          # Create dedicated keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="kcpass"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list, keep login keychain too
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import cert
          security import cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "certpass" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          # Allow codesign to use the key without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "=== identities in keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # SHA-1 of the cert for CODE_SIGN_IDENTITY
          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "NoorAtlasSelfSign" \
            | head -n1 \
            | awk -F'"' '{print $1}' \
            | awk '{print $2}')

          if [[ -z "$IDENTITY_HASH" ]]; then
            echo "ERROR: Could not extract identity hash"
            exit 1
          fi
          echo "Identity hash: $IDENTITY_HASH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

      - name: Resolve workspace and main app scheme
        id: project
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [[ -z "$workspace" ]]; then
            echo "ERROR: No xcworkspace found."
            ls -la ios/ || true
            exit 1
          fi

          echo "=== xcodebuild -list -workspace ==="
          xcodebuild -list -workspace "$workspace" || true
          echo "=== end ==="

          scheme="$(xcodebuild -list -workspace "$workspace" -json \
            | jq -r '.workspace.schemes[] | select(startswith("Pods") | not)' \
            | head -n1)"

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            scheme="$(xcodebuild -list -workspace "$workspace" -json | jq -r '.workspace.schemes[0]')"
          fi

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            echo "ERROR: Unable to determine Xcode scheme."
            exit 1
          fi

          echo "Detected workspace=$workspace"
          echo "Detected scheme=$scheme"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "scheme=$scheme"       >> "$GITHUB_OUTPUT"

      - name: Archive with self-signed identity
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME: ${{ steps.project.outputs.scheme }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/App.xcarchive"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Archiving '$SCHEME' with identity $IDENTITY_HASH"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$archive_path" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CODE_SIGN_IDENTITY="$IDENTITY_HASH" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_STYLE=Manual \
            archive

          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

          echo "=== Archive tree (depth 4) ==="
          find "$archive_path" -maxdepth 4 -type d || true
          echo "=== end ==="

      - name: Locate built .app inside archive
        id: appfind
        shell: bash
        run: |
          set -euo pipefail
          apps_dir="$ARCHIVE_PATH/Products/Applications"

          if [[ ! -d "$apps_dir" ]]; then
            echo "ERROR: $apps_dir does not exist."
            find "$ARCHIVE_PATH" -maxdepth 6 || true
            exit 1
          fi

          ls -la "$apps_dir"
          app_path="$(find "$apps_dir" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "ERROR: No .app inside $apps_dir"
            exit 1
          fi
          echo "Found app: $app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Strip self-signed signature (so Sideloadly can re-sign)
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          # Remove embedded mobile provision and signing data so the IPA
          # is effectively unsigned and ready for Sideloadly / AltStore.
          rm -rf "$APP_PATH/_CodeSignature" || true
          rm -f "$APP_PATH/embedded.mobileprovision" || true
          # Also strip frameworks
          if [[ -d "$APP_PATH/Frameworks" ]]; then
            for fw in "$APP_PATH"/Frameworks/*.framework; do
              [[ -d "$fw" ]] || continue
              rm -rf "$fw/_CodeSignature" || true
            done
          fi
          echo "Stripped signature from $APP_PATH"

      - name: Package unsigned IPA
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          payload_dir="$RUNNER_TEMP/Payload"
          rm -rf "$payload_dir"
          mkdir -p "$payload_dir"
          cp -R "$APP_PATH" "$payload_dir/"
          cd "$RUNNER_TEMP"
          zip -qry NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa
          unzip -l NoorAtlas-unsigned.ipa | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ${{ runner.temp }}/NoorAtlas-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
