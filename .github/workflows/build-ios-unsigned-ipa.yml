name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install JS dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Print ios/ tree
        run: |
          ls -la ios/
          find ios -maxdepth 2 -type d

      - name: Resolve workspace and main app target
        id: project
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [[ -z "$workspace" ]]; then
            echo "ERROR: No xcworkspace was generated."
            exit 1
          fi

          echo "=== xcodebuild -list -workspace ==="
          xcodebuild -list -workspace "$workspace" || true
          echo "=== xcodebuild -list -workspace -json ==="
          xcodebuild -list -workspace "$workspace" -json || true
          echo "=== end ==="

          # Take first scheme that is NOT a Pods-* helper
          scheme="$(xcodebuild -list -workspace "$workspace" -json \
            | jq -r '.workspace.schemes[] | select(startswith("Pods") | not)' \
            | head -n1)"

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            scheme="$(xcodebuild -list -workspace "$workspace" -json | jq -r '.workspace.schemes[0]')"
          fi

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            echo "ERROR: Unable to determine Xcode scheme."
            exit 1
          fi

          echo "Detected workspace=$workspace"
          echo "Detected scheme=$scheme"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "scheme=$scheme"       >> "$GITHUB_OUTPUT"

      - name: Archive with ad-hoc signing (no real cert needed)
        id: archive
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME: ${{ steps.project.outputs.scheme }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/App.xcarchive"
          echo "Archiving scheme '$SCHEME' from workspace '$WORKSPACE' to $archive_path"

          # CODE_SIGN_IDENTITY="-" tells Xcode to use ad-hoc signing (no real cert).
          # This produces a complete .xcarchive with Products/Applications/*.app
          # that Sideloadly / AltStore will resign with the user's Apple ID.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$archive_path" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

          echo "=== Archive tree (depth 4) ==="
          find "$archive_path" -maxdepth 4 -type d || true
          echo "=== end ==="

      - name: Locate built .app inside archive
        id: appfind
        shell: bash
        run: |
          set -euo pipefail
          apps_dir="$ARCHIVE_PATH/Products/Applications"

          if [[ ! -d "$apps_dir" ]]; then
            echo "ERROR: $apps_dir does not exist after archive."
            echo "=== Full archive tree ==="
            find "$ARCHIVE_PATH" -maxdepth 6 || true
            exit 1
          fi

          echo "=== Apps in archive ==="
          ls -la "$apps_dir"

          app_path="$(find "$apps_dir" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "ERROR: No .app inside $apps_dir"
            exit 1
          fi
          echo "Found app: $app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          payload_dir="$RUNNER_TEMP/Payload"
          rm -rf "$payload_dir"
          mkdir -p "$payload_dir"
          cp -R "$APP_PATH" "$payload_dir/"
          cd "$RUNNER_TEMP"
          zip -qry NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa
          unzip -l NoorAtlas-unsigned.ipa | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ${{ runner.temp }}/NoorAtlas-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
