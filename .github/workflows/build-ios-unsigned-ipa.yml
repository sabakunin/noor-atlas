name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install JS dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Print ios/ tree
        run: |
          ls -la ios/
          find ios -maxdepth 2 -type d

      - name: Resolve workspace and main app scheme
        id: project
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [[ -z "$workspace" ]]; then
            echo "ERROR: No xcworkspace found."
            exit 1
          fi

          ws_base="$(basename "$workspace" .xcworkspace)"
          echo "Workspace basename: $ws_base"

          echo "=== xcodebuild -list ==="
          xcodebuild -list -workspace "$workspace" || true

          # Prefer scheme whose name matches the workspace (e.g. NoorAtlas).
          scheme="$(xcodebuild -list -workspace "$workspace" -json \
            | jq -r --arg n "$ws_base" '.workspace.schemes[] | select(. == $n)' \
            | head -n1)"

          # Fallback: also check the .xcodeproj target list for a project-defined app target.
          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            project="ios/${ws_base}.xcodeproj"
            if [[ -d "$project" ]]; then
              scheme="$(xcodebuild -list -project "$project" -json \
                | jq -r --arg n "$ws_base" '.project.targets[] | select(. == $n)' \
                | head -n1)"
            fi
          fi

          # Last-resort fallback: any scheme that is not Pods-* and not a known library prefix.
          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            scheme="$(xcodebuild -list -workspace "$workspace" -json \
              | jq -r '.workspace.schemes[]
                  | select(startswith("Pods") | not)
                  | select(startswith("React") | not)
                  | select(startswith("RCT") | not)
                  | select(startswith("RN") | not)
                  | select(startswith("Expo") | not)
                  | select(startswith("EX") | not)
                  | select(startswith("FB") | not)
                  | select(. != "Yoga")
                  | select(. != "hermes-engine")
                  | select(. != "ReactCommon")
                  | select(. != "ReactCodegen")
                  | select(. != "ReactAppDependencyProvider")
                  | select(. != "ReactNativeDependencies")' \
              | head -n1)"
          fi

          if [[ -z "$scheme" || "$scheme" == "null" ]]; then
            echo "ERROR: Unable to determine main app Xcode scheme."
            exit 1
          fi

          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "scheme=$scheme"       >> "$GITHUB_OUTPUT"
          echo "Detected workspace=$workspace scheme=$scheme"

      - name: Write xcconfig that disables code signing globally
        id: xcconfig
        shell: bash
        run: |
          cfg="$RUNNER_TEMP/unsigned.xcconfig"
          {
            echo 'CODE_SIGN_IDENTITY = '
            echo 'CODE_SIGNING_REQUIRED = NO'
            echo 'CODE_SIGNING_ALLOWED = NO'
          } > "$cfg"
          echo "=== unsigned.xcconfig ==="
          cat "$cfg"
          echo "xcconfig=$cfg" >> "$GITHUB_OUTPUT"

      - name: Build unsigned .app for iphoneos
        id: build
        shell: bash
        env:
          WORKSPACE: ${{ steps.project.outputs.workspace }}
          SCHEME:    ${{ steps.project.outputs.scheme }}
          XCCONFIG:  ${{ steps.xcconfig.outputs.xcconfig }}
        run: |
          set -euo pipefail
          derived="$RUNNER_TEMP/derived"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$derived" \
            -destination "generic/platform=iOS" \
            -xcconfig "$XCCONFIG" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | tail -200

          echo "DERIVED=$derived" >> "$GITHUB_ENV"

          echo "=== Build/Products tree (depth 5) ==="
          find "$derived/Build/Products" -maxdepth 5 -type d || true
          echo "=== .app candidates anywhere in derived ==="
          find "$derived" -type d -name '*.app' 2>/dev/null || true

      - name: Locate .app
        id: appfind
        shell: bash
        run: |
          set -euo pipefail
          # First, the canonical place
          app_path="$(find "$DERIVED/Build/Products" -maxdepth 4 -type d -name '*.app' \
            -not -path '*/Pods/*' -not -path '*/Intermediates*' -print -quit 2>/dev/null || true)"

          if [[ -z "$app_path" ]]; then
            # Wider search
            app_path="$(find "$DERIVED" -type d -name '*.app' \
              -not -path '*/Pods/*' -not -path '*/Intermediates*' -print -quit 2>/dev/null || true)"
          fi

          if [[ -z "$app_path" || ! -d "$app_path" ]]; then
            echo "ERROR: no .app found anywhere under $DERIVED"
            echo "=== full derived tree (.app only) ==="
            find "$DERIVED" -type d -name '*.app' || true
            echo "=== Release-iphoneos contents ==="
            ls -la "$DERIVED/Build/Products/Release-iphoneos" 2>/dev/null || true
            exit 1
          fi

          echo "Found app: $app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        shell: bash
        env:
          APP_PATH: ${{ steps.appfind.outputs.app_path }}
        run: |
          set -euo pipefail
          # Strip any residual signature bits, just in case
          rm -rf "$APP_PATH/_CodeSignature" || true
          rm -f  "$APP_PATH/embedded.mobileprovision" || true
          if [[ -d "$APP_PATH/Frameworks" ]]; then
            for fw in "$APP_PATH"/Frameworks/*.framework; do
              [[ -d "$fw" ]] || continue
              rm -rf "$fw/_CodeSignature" || true
            done
          fi

          payload_dir="$RUNNER_TEMP/Payload"
          rm -rf "$payload_dir"
          mkdir -p "$payload_dir"
          cp -R "$APP_PATH" "$payload_dir/"
          cd "$RUNNER_TEMP"
          zip -qry NoorAtlas-unsigned.ipa Payload
          ls -lh NoorAtlas-unsigned.ipa
          unzip -l NoorAtlas-unsigned.ipa | head -25

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorAtlas-unsigned-ipa
          path: ${{ runner.temp }}/NoorAtlas-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7
